<!DOCTYPE html>
<html>
<head>
    <title>Flask MariaDB Interface</title>
    <style>
        html, body {
            height: 100%;
            margin: 0;
        }
        .container {
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        button {
            padding: 15px 25px;
            font-size: 18px;
            cursor: pointer;
        }
        .message {
            margin-top: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Insert into DB</h1>
        <form method="POST">
            <button type="submit">Write Data</button>
        </form>
        {% if message %}
            <div class="message">{{ message }}</div>
        {% endif %}
    </div>
</body>
</html>
